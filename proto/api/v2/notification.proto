// Notification API provides interfaces for configuring notifications in Michelangelo.
// Notifications allow users to receive alerts and updates about pipeline events:
// - Pipeline run completion, failure or skipped states
// - Trigger run status changes
// - Pipeline state transitions
//
// Key concepts:
// - Multiple notification types (email, slack)
// - Event-based triggering
// - Resource-specific notifications
// - Customizable message templates

syntax = "proto3";

package michelangelo.api.v2;

option go_package = "v2";

// Notification defines configuration for sending alerts and updates about pipeline events.
// It specifies:
// - Type of notification (email, slack)
// - Events that trigger notifications (success, failure, etc)
// - Resource the notification applies to (pipeline, run, trigger)
// - Recipients and message templates
// For example:
// - Email notifications when pipeline runs complete
// - Slack alerts on pipeline failures
// - Status updates for trigger runs
// The notification settings control:
// - When notifications are sent (event triggers)
// - How they are delivered (notification type) 
// - Who receives them (recipients)
message Notification {
  // The type of the notification.
  enum NotificationType {
    // Invalid notification type.
    NOTIFICATION_TYPE_INVALID = 0;
    // Email notification type.
    NOTIFICATION_TYPE_EMAIL = 1;
    // Slack notification type.
    NOTIFICATION_TYPE_SLACK = 2;
  }
  enum EventType {
    // Invalid event type.
    EVENT_TYPE_INVALID = 0;
    // Notification is generated by pipeline run succeeded.
    EVENT_TYPE_PIPELINE_RUN_STATE_SUCCEEDED = 1;
    // Notification is generated by pipeline run killed.
    EVENT_TYPE_PIPELINE_RUN_STATE_KILLED = 2;
    // Notification is generated by pipeline run failed.
    EVENT_TYPE_PIPELINE_RUN_STATE_FAILED = 3;
    // Notification is generated by pipeline run skipped.
    EVENT_TYPE_PIPELINE_RUN_STATE_SKIPPED = 4;
    // Reserved. Not yet implemented — configuring this event type has no effect.
    EVENT_TYPE_TRIGGER_RUN_STATE_KILLED = 5;
    // Reserved. Not yet implemented — configuring this event type has no effect.
    EVENT_TYPE_TRIGGER_RUN_STATE_FAILED = 6;
    // Reserved. Not yet implemented — configuring this event type has no effect.
    EVENT_TYPE_TRIGGER_RUN_STATE_SUCCEEDED = 7;
    // Reserved. Not yet implemented — configuring this event type has no effect.
    EVENT_TYPE_PIPELINE_STATE_READY = 8;
    // Reserved. Not yet implemented — configuring this event type has no effect.
    EVENT_TYPE_PIPELINE_STATE_ERROR = 9;
    // Deprecated: use EVENT_TYPE_PIPELINE_RUN_STATE_STARTED instead. Kept for
    // backward compatibility with currently deployed systems. Will be removed in
    // a future release.
    EVENT_TYPE_PIPELINE_RUN_STATE_RUNNING = 10 [deprecated = true];
    // Notification is generated when a pipeline run transitions to the running state.
    EVENT_TYPE_PIPELINE_RUN_STATE_STARTED = 11;
  }
  enum ResourceType {
    // Invalid resource type.
    RESOURCE_TYPE_INVALID = 0;
    // Notification is from pipeline run.
    RESOURCE_TYPE_PIPELINE_RUN = 1;
    // Notification is from trigger run.
    RESOURCE_TYPE_TRIGGER_RUN = 2;
    // Notification is from pipeline.
    RESOURCE_TYPE_PIPELINE = 3;
  }

  // The type of the notification.
  NotificationType notification_type = 1;
  
  // The event type of notification generation
  repeated EventType event_types = 2;
  
  // The resource type of notification
  ResourceType resource_type = 3;
  
  // The email address to send the notification to.
  repeated string emails = 4;
  
  // The slack destinations to send the notification to.
  repeated string slack_destinations = 5;
}
