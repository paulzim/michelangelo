// Conditions API defines a v2-package Condition message used by v2 resources
// that participate in multi-version conversion (e.g., PipelineRun). The fields
// mirror michelangelo.api.Condition; the v2-specific package allows the
// kubeconversion plugin to map v2beta1.Condition <-> v2.Condition by name.

syntax = "proto3";

package michelangelo.api.v2;

import "google/protobuf/any.proto";

option go_package = "v2";

// Defines a condition that can be used to determine the status of a resource.
message Condition {
  // Required: a human readable camel-case string that is a positive indicator
  // (meaning that a CONDITION_STATUS_TRUE should always refer to a 'healthy' condition) of a condition.
  // For example, a condition called 'contains_failed_instances' would not be satisfactory
  // because it is a negative indicator, and because it is snake case.
  string type = 1;

  // Required: The status of a condition. Can be one of CONDITION_STATUS_UNKNOWN, CONDITION_STATUS_TRUE,
  // or CONDITION_STATUS_FALSE.
  ConditionStatus status = 2;

  // Optional: The reason that a condition is set. This will provide more context than the type can and may
  // provide dynamic properties used for debugging purposes. The audience of this property is the maintainer
  // of the resource.
  string reason = 3;

  // Optional: The message pertaining to the condition. This is similar to reason, except that the audience
  // of this property is the end user of the platform, so the purpose of this property is to inform, not debug.
  string message = 4;

  // Optional: The time the condition was last changed in UNIX Epoch time. This refers to the number of elapsed
  // milliseconds from  00:00:00 UTC on 1 January 1970.
  int64 last_updated_timestamp = 5;

  // Condition and plugin specific information that can be stored in between condition evaluations.
  google.protobuf.Any metadata = 6;

  // ObservedGeneration represents the .metadata.generation that the condition was set based upon.
  int64 observed_generation = 7;
}

// Defines the status of a condition.
enum ConditionStatus {
  // The status that is used when the condition cannot be properly evaluated.
  CONDITION_STATUS_UNKNOWN = 0;

  // The status that is used when the condition is satisfied.
  CONDITION_STATUS_TRUE = 1;

  // The status that is used when the condition is not satisfied.
  CONDITION_STATUS_FALSE = 2;
}
