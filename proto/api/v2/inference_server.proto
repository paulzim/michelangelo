// This file defines the Inference Server related messages in Michelangelo API.

syntax = "proto3";

package michelangelo.api.v2;

option go_package = "v2";

import "k8s.io/apimachinery/pkg/apis/meta/v1/generated.proto";
import "michelangelo/api/options.proto";
import "michelangelo/api/conditions.proto";
import "michelangelo/api/v2/kubernetes.proto";
import "michelangelo/api/v2/pod.proto";
import "michelangelo/api/v2/project.proto";
import "michelangelo/api/v2/user.proto";

// ServingSpec encapsulates serving service specification.
message ServingSpec {
  // Optional version to deploy. This can either be a server version or the git sha of
  // the prediction service. If no version is specified the service will use its
  // own heuristics to pick a version.
  string version = 1;

  // Optional template to use when generating container (pinocchio) files. If not specified then
  // a default template will be used.
  string container_build_template = 2;

  // TODO(#933): Add serving time dependencies.
}

// Ownership spec for the InferenceServer. Used for capacity attribution and
// tier information.
message OwnerSpec {
  // Optional owner information of the inference server.
  OwnerInfo owner_info = 1;
  // Optional tier of the inference server. Valid values range from 1-4, with
  // 1 being the highest and 4 being the lowest.
  int32 tier = 2;
}

// Initialization spec for provisioning the InferenceServer.
// Only used during the initialization of the resource.
message InitSpec {
  // Initial resource spec.
  ResourceSpec resource_spec = 1;
  // Serving spec.
  ServingSpec serving_spec = 2;
  // Number of instances.
  int32 num_instances = 3;
}

// DecomSpec for decommissioning an InferenceServer. This acts a soft-delete.
message DecomSpec {
  // Whether or not to decommission this InferenceServer. Defaults to false.
  bool decommission = 1;
}

// TenancyType specifies the Inference Server tenancy type.
enum TenancyType {
  TENANCY_TYPE_INVALID = 0;
  // Dedicated InferenceServer only support 1 project. For such InferenceServers,
  // the ownership spec can be inferred via the project namespace they belong
  // in.
  TENANCY_TYPE_DEDICATED = 1;
  // Multi-tenant InferenceServers can support more than 1 use case. For such InferenceServers
  // the OwnerSpec must be specified.
  TENANCY_TYPE_MULTI_TENANT = 2;
}

// BackendType specifies the type of inference serving backend.
enum BackendType {
  BACKEND_TYPE_INVALID = 0;
  // Triton Inference Server backend
  BACKEND_TYPE_TRITON = 1;
  // LLM-D (Large Language Model Deployer) backend
  BACKEND_TYPE_LLM_D = 2;
  // Dynamo (Disaggregated Inference) backend
  BACKEND_TYPE_DYNAMO = 3;
  // TorchServe backend
  BACKEND_TYPE_TORCHSERVE = 4;
}

// ClusterTarget identifies a Kubernetes cluster where the InferenceServer's
// workloads should be provisioned.
message ClusterTarget {
  // Stable, human-readable identifier for the cluster (e.g. "k3d-test-a",
  // "gke-prod-us-west-1"). Must be unique across the InferenceServer's
  // cluster_targets list.
  string cluster_id = 1;

  // How to connect to the cluster.
  oneof connection {
    option (michelangelo.api.required) = true;
    ConnectionSpec kubernetes = 2;
  }
}

// Inference Server spec.
message InferenceServerSpec {
  // Tenancy type of this InferenceServer.
  TenancyType tenancy_type = 1;
  // Owner spec for this InferenceServer.
  OwnerSpec owner_spec = 2;
  // Optional initialization spec used for provisioning.
  InitSpec init_spec = 3;
  // Optional decommissioning spec.
  DecomSpec decom_spec = 4;
  // Information about the most recent user to update the InferenceServer.
  // The InferenceServer's owner is the user who update the InferenceServer, not the really owner, we use owner to keep the consistency.
  UserInfo owner = 5;
  // Backend type for this InferenceServer (e.g. Triton, LLM-D, Dynamo).
  BackendType backend_type = 6;
  // Clusters where this InferenceServer should be provisioned. One workload
  // set per ClusterTarget.
  // At least one ClusterTarget is required.
  repeated ClusterTarget cluster_targets = 7;
}

// The state of the Inference Server.
enum InferenceServerState {
  INFERENCE_SERVER_STATE_INVALID = 0;
  INFERENCE_SERVER_STATE_INITIALIZED = 1;
  INFERENCE_SERVER_STATE_CREATE_PENDING = 2;
  INFERENCE_SERVER_STATE_SERVING = 3;
  INFERENCE_SERVER_STATE_FAILED = 4;
  INFERENCE_SERVER_STATE_DELETE_PENDING = 5;
  INFERENCE_SERVER_STATE_CREATING = 6;
  INFERENCE_SERVER_STATE_DELETING = 7;
  INFERENCE_SERVER_STATE_DELETED = 8;
}

// ClusterTargetStatus reports the observed state of an InferenceServer on
// a single ClusterTarget.
message ClusterTargetStatus {
  // Matches ClusterTarget.cluster_id in the spec.
  string cluster_id = 1;

  // Per-cluster lifecycle state.
  InferenceServerState state = 2;

  // Per-cluster conditions.
  repeated Condition conditions = 3;

  // Free-form message for human-readable detail (e.g., last error).
  string message = 4;
}

// The status of the InferenceServer.
message InferenceServerStatus {
  // The uuid of the InferenceServer.
  string inference_server_id = 1;
  // Observed generation is the most recent generation observed for this InferenceServer. It corresponds to the
  // InferenceServer's generation, which is updated on mutation by the API Server.
  int64 observed_generation = 2;
  // The state of the IngerenceServer.
  InferenceServerState state = 3;
  // The provider specific meta data about the InferenceServer state. This is intended to be used by
  // the InferenceServer provider as an optimization to build the current state.
  string provider_metadata = 4;
  // The time when the InferenceServer was created. The time is represented in
  // RFC3339 form with UTC timezone.
  string create_time = 5;
  // The time when the InferenceServer was last updated. The time
  // is represented in RFC3339 form with UTC timezone.
  string update_time = 6;
  // conditions refer to the conditions that are relevant for the InferenceServer
  repeated Condition conditions = 7;
  // Available environments correspond to the list of environments that are available for
  // this InferenceServer resource.
  repeated string available_environments = 8;
  // Per-cluster status, one entry per ClusterTarget in spec.cluster_targets.
  repeated ClusterTargetStatus cluster_statuses = 9;
}

// Defines a managed InferenceServer service for model serving.
message InferenceServer {
  option (michelangelo.api.resource) = {};

  // Index fields
  option (michelangelo.api.index) = {
    path: "status.state",
    key: "state",
  };

  k8s.io.apimachinery.pkg.apis.meta.v1.TypeMeta type_meta = 1;
  k8s.io.apimachinery.pkg.apis.meta.v1.ObjectMeta metadata = 2;

  // Spec of the desired behavior of the InferenceServer.
  InferenceServerSpec spec = 3;

  // Most recently observed status of the InferenceServer.
  InferenceServerStatus status = 4;
}

// A list of InferenceServer objects.
message InferenceServerList {
  option (michelangelo.api.resource_list) = {};

  k8s.io.apimachinery.pkg.apis.meta.v1.TypeMeta type_meta = 1;
  k8s.io.apimachinery.pkg.apis.meta.v1.ListMeta metadata = 2;

  // A list of InferenceServer objects
  repeated InferenceServer items = 3;
}
