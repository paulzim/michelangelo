# -----------------------------------------------------------------------------
# Local k3d overrides for the michelangelo chart.
#
# Used by `michelangelo sandbox up`, which provisions MySQL, MinIO, and Cadence
# in the same cluster, then runs:
#
#     helm install michelangelo ./helm/michelangelo -f values-k3d.yaml
#
# The NodePort values below must match the `--port` flags k3d was created with.
# -----------------------------------------------------------------------------

metadataStorage:
  driver: mysql
  host: mysql
  port: 3306
  database: michelangelo
  rootPassword: root

objectStorage:
  endpoint: minio:9091
  secure: false
  region: us-east-1
  bucket: michelangelo
  accessKeyId: minioadmin
  secretAccessKey: minioadmin

workflow:
  engine: cadence
  # Cadence gRPC frontend. Source: michelangelo-worker.yaml:42 and
  # michelangelo-controllermgr.yaml:101 both use port 7833. Port 7933 is the
  # TChannel endpoint used by the Cadence CLI, not by the worker.
  endpoint: cadence:7833
  domain: default

images:
  pullPolicy: IfNotPresent

apiserver:
  metadataStorage:
    enable: true
  service:
    type: NodePort
    nodePort: 30009

envoy:
  corsOrigins: "http://localhost:[0-9]+"
  service:
    type: NodePort
    nodePort: 30010

ui:
  apiBaseUrl: "http://localhost:8081"
  service:
    type: NodePort
    nodePort: 30011

# Sandbox is single-node; no scheduling constraints.
nodeSelector: {}
tolerations: []
affinity: {}

# Ray cluster log persistence — enabled for sandbox to wire up the KubeRay
# History Server. The collector sidecar uses the in-cluster MinIO endpoint
# (minio:9091) and the chart-managed object-storage-credentials Secret.
# The collector image is pulled from GHCR automatically (no local build needed).
controllermgr:
  metadataStorage:
    enable: true
  jobs:
    k8sengine:
      mapper:
        logPersistence:
          enabled: true
          # storageEndpoint defaults to objectStorage.endpoint (minio:9091) — no override needed
          bucket: ray-history
          pathPrefix: log
          s3DisableSSL: true
          logURLFormat: "http://localhost:9090/browser/{{.Bucket}}/{{.PathPrefix}}/{{.ClusterName}}_{{.RayLocalNamespace}}/"



# Looser security context for sandbox — ingester writes to /tmp and some
# debug images need privilege escalation. Production keeps the chart defaults.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
securityContext:
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: false
  capabilities:
    drop: []

# -----------------------------------------------------------------------------
# Cadence subchart — bundled workflow engine for the local sandbox.
#
# The sandbox installs Cadence as a subchart of the michelangelo release so
# everything comes up under one helm install. Backed by the sandbox MySQL pod
# (mysql:3306, root/root). The cadence and cadence_visibility databases are
# auto-created by the schema-server Job.
#
# The Cadence frontend Service stays ClusterIP (upstream chart hardcodes it).
# Host access for the cadence CLI works via k3d port mapping to NodePort.
# -----------------------------------------------------------------------------
cadence:
  enabled: true

  config:
    persistence:
      database:
        driver: mysql
        sql:
          hosts: mysql
          port: 3306
          user: root
          password: root
          dbname: cadence
          visibilityDbname: cadence_visibility

  # Disable backends we are not using — the upstream chart defaults
  # cassandra.enabled=true which would pull in a Bitnami pod.
  cassandra:
    enabled: false
  mysql:
    enabled: false
  postgresql:
    enabled: false
  kafka:
    enabled: false

  # Cadence Web UI exposed via NodePort 30004 → host port 8088.
  web:
    enabled: true
    service:
      type: NodePort
      nodePort: 30004

  # Dynamic config overrides.
  #
  # The upstream Cadence helm subchart ships a minimal dynamicconfig that only
  # sets retention + visibility store. It does NOT enable strongly-consistent
  # queries, which Cadence's default is "off".
  #
  # The michelangelo controller hardcodes QueryConsistencyLevelStrong when
  # querying the `task_progress` workflow handler on every reconcile loop
  # (cadenceclient.go). Without this flag, every query fails with:
  #   BadRequestError: cluster or domain does not enable strongly consistent
  #   query but strongly consistent query was requested
  # This leaves PipelineRun.status.steps[].subSteps[].activityId always empty,
  # so the Retry button never appears even for terminated runs.
  #
  # The previous (pre-2026-05-13) sandbox used ubercadence/server:auto-setup,
  # whose bundled development.yaml enables this by default. The helm migration
  # silently dropped it.
  #
  # Key names must be exact: history.EnableConsistentQuery (capital E, history.
  # prefix). Wrong prefix (system.) or wrong case are silently ignored.
  dynamicConfig:
    values:
      system.minRetentionDays:
        - value: 0
          constraints: {}
      system.writeVisibilityStoreName:
        - value: "db"
      system.readVisibilityStoreName:
        - value: "db"
      history.EnableConsistentQuery:
        - value: true
      history.EnableConsistentQueryByDomain:
        - value: true

# -----------------------------------------------------------------------------
# Temporal subchart — bundled workflow engine for --workflow temporal.
#
# Disabled by default; enabled dynamically by sandbox.py when
# --workflow temporal is passed. The schema-server Job creates both
# `temporal` and `temporal_visibility` databases automatically.
#
# IMPORTANT: driver must be "mysql8" (not "mysql") — Temporal uses a
# different driver string from Cadence.
# -----------------------------------------------------------------------------
temporal:
  enabled: false

  server:
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: mysql8
            host: mysql
            port: 3306
            database: temporal
            user: root
            password: root
        visibility:
          driver: sql
          sql:
            driver: mysql8
            host: mysql
            port: 3306
            database: temporal_visibility
            user: root
            password: root

  # Disable unused backends.
  cassandra:
    enabled: false
  mysql:
    enabled: false
  postgresql:
    enabled: false
  elasticsearch:
    enabled: false

  # Temporal Web UI exposed via NodePort 30005 → host port 8080.
  web:
    enabled: true
    service:
      type: NodePort
      nodePort: 30005
