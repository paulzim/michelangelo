# -----------------------------------------------------------------------------
# Michelangelo Helm chart values
#
# This chart installs the Michelangelo control plane only. Infrastructure
# (metadata storage, object storage, workflow engine) must be reachable from
# inside the cluster — the chart consumes endpoints and credentials, it does
# not provision them.
#
# For a local development setup with all infrastructure provided, use the
# accompanying `values-k3d.yaml` together with `michelangelo sandbox up`.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Metadata storage — backing database for Michelangelo CRDs and workflow state.
# -----------------------------------------------------------------------------
metadataStorage:
  # "mysql" or "postgres". Selects the schema-init image and JDBC dialect.
  driver: mysql

  # REQUIRED. Hostname of the metadata storage server.
  # Examples: "my-rds.us-east-1.rds.amazonaws.com", "mysql.michelangelo.svc.cluster.local"
  # Install fails fast with a clear error if this is empty.
  host: ""

  # Port. Defaults to 3306 for MySQL, 5432 for Postgres.
  port: 3306

  # Database name. Created by the schema-init container if it does not exist.
  database: michelangelo

  # Database user. Defaults to root.
  user: root

  # REQUIRED. Root password. Used by both the schema-init container and the
  # runtime services. Pass via `--set` from a secrets manager — never commit.
  # If you prefer to manage this via an external Secret, set
  # `metadataStorage.existingSecret` instead and leave this empty.
  rootPassword: ""

  # Optional. Name of a pre-existing Secret with a `password` key. When set,
  # the chart reads the root password from this Secret and ignores
  # `rootPassword` above.
  existingSecret: ""

# -----------------------------------------------------------------------------
# Object storage — S3-compatible artifact, model, and log store.
# -----------------------------------------------------------------------------
objectStorage:
  # REQUIRED. S3-compatible endpoint.
  # Examples: "s3.amazonaws.com", "storage.googleapis.com", "minio:9000"
  endpoint: ""

  # TLS. Set false only for in-cluster MinIO without TLS termination.
  secure: true

  # AWS region. Used by S3, GCS HMAC, and MinIO. The chart sets AWS_REGION
  # in every service that talks to object storage.
  region: us-east-1

  # Bucket name for artifacts, models, and logs.
  bucket: michelangelo

  # REQUIRED unless `existingSecret` is set. Access key ID for object storage.
  accessKeyId: ""

  # REQUIRED unless `existingSecret` is set. Secret access key for object storage.
  secretAccessKey: ""

  # Optional. Name of a pre-existing Secret with `AWS_ACCESS_KEY_ID` and
  # `AWS_SECRET_ACCESS_KEY` keys. When set, the chart consumes this Secret
  # and ignores `accessKeyId` / `secretAccessKey` above.
  #
  # The chart-managed Secret is annotated `helm.sh/resource-policy: keep`
  # so `helm upgrade` does not overwrite credentials injected externally.
  existingSecret: ""

# -----------------------------------------------------------------------------
# Workflow engine — Cadence or Temporal. Required by worker and apiserver.
# -----------------------------------------------------------------------------
workflow:
  # "cadence" or "temporal". Mutually exclusive — picks which provider block
  # the worker config renders.
  engine: cadence

  # REQUIRED. Workflow engine address.
  # Cadence example: "cadence-frontend:7833"
  # Temporal example: "temporal-frontend:7233"
  endpoint: ""

  # Cadence domain or Temporal namespace. Created out-of-band — the chart
  # does not register domains or namespaces.
  domain: default

  # Task lists / queues used by the worker. Override only if you need to
  # isolate workloads across multiple worker deployments.
  taskLists:
    - default
    - trigger_run
    # Deprecated: will be removed in a future release. Kept for backward compatibility with currently deployed systems.
    - pipeline_run
    - notification_worker

# -----------------------------------------------------------------------------
# Container images. Override to pin a version or use a mirror.
# -----------------------------------------------------------------------------
images:
  apiserver:        ghcr.io/michelangelo-ai/apiserver:main
  worker:           ghcr.io/michelangelo-ai/worker:main
  ui:               ghcr.io/michelangelo-ai/ui:main
  controllermgr:    ghcr.io/michelangelo-ai/controllermgr:main
  envoy:            envoyproxy/envoy:v1.29-latest
  kuberayCollector: ghcr.io/michelangelo-ai/kuberay-collector:main

  # IfNotPresent (default), Always, or Never. Use Always when pinning to
  # mutable tags like ":main" in development.
  pullPolicy: IfNotPresent

# Image pull secrets for private registries. List of Secret names.
# Example: [{ name: ghcr-creds }]
imagePullSecrets: []

# -----------------------------------------------------------------------------
# apiserver — gRPC API server. Required for any Michelangelo functionality.
# -----------------------------------------------------------------------------
apiserver:
  # Disable the apiserver Deployment. Useful for ops-only installs that want
  # the controller manager but no API surface.
  enabled: true

  # gRPC port. Other services find the apiserver at this port via Service DNS.
  port: 15566

  # Kubernetes API client tuning for the apiserver.
  k8s:
    qps: 300
    burst: 600

  # Apiserver-specific config knobs. 
  metadataStorage:
    enable: false
  crdSync:
    enableUpdate: true

  # Resource requests and limits. Override per-service if you need different
  # allocations than the global `resources` block below.
  resources: {}

  service:
    # ClusterIP (default), NodePort, or LoadBalancer.
    type: ClusterIP

    # Required when type=NodePort. Ignored otherwise.
    nodePort: null

  # ---------------------------------------------------------------------------
  # TLS for the apiserver gRPC port. Independent of Ingress — turn this on if
  # you want pod-level TLS (e.g. mesh mTLS, or apiserver.ingress.mode=passthrough
  # which terminates TLS at the pod, not the controller).
  # ---------------------------------------------------------------------------
  tls:
    # Toggle TLS on the gRPC listener. When true, the Service exposes a
    # `grpcs` port and the apiserver loads `tls.crt` + `tls.key` from
    # `secretName` mounted at `mountPath`.
    enabled: false

    # REQUIRED when tls.enabled=true. Name of a kubernetes.io/tls Secret in
    # the release namespace containing `tls.crt` and `tls.key`. Create with:
    #   kubectl create secret tls apiserver-tls --cert=server.crt --key=server.key
    secretName: ""

    # Where the Secret is mounted inside the apiserver container. The
    # apiserver looks for tls.crt and tls.key under this path.
    mountPath: /tls

  # ---------------------------------------------------------------------------
  # Ingress for the apiserver gRPC port. Use only when external gRPC clients
  # (CLI, SDK) need direct access. Browser UI goes through envoy, not here.
  # ---------------------------------------------------------------------------
  ingress:
    enabled: false
    # "grpc" (recommended) — controller terminates TLS, proxies h2c to pod.
    # "passthrough" — raw TLS forwarded; pod must terminate (apiserver.tls.enabled=true required).
    mode: grpc
    className: ""
    # The chart auto-injects the mode annotation:
    #   grpc:        nginx.ingress.kubernetes.io/backend-protocol: GRPC
    #   passthrough: nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    annotations: {}
    # Hostname MUST differ from ui.ingress and envoy.ingress hosts.
    hosts: []
    # Example:
    #   hosts:
    #     - host: grpc.michelangelo.example.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    tls: []

# -----------------------------------------------------------------------------
# envoy — gRPC-Web proxy. Required for the browser UI.
# -----------------------------------------------------------------------------
envoy:
  enabled: true

  # gRPC-Web port. The UI's `apiBaseUrl` should point here.
  port: 8081

  # CORS origin regex. Required whenever the UI runs on a different origin
  # than envoy — which means EVERY Ingress install. The browser refuses to
  # call envoy if its Access-Control-Allow-Origin header doesn't match the
  # UI's origin. Symptom: UI loads, every API call fails with a CORS error.
  #
  # The value is a Go regex — escape literal dots as `\.`:
  # Local dev:      "http://localhost:[0-9]+"
  # Single host:    "https://michelangelo\\.example\\.com"
  # Multiple:       "https://(michelangelo|staging)\\.example\\.com"
  #
  # When envoy.ingress.enabled=true, this MUST match the scheme + host
  # of ui.ingress.hosts[0].host.
  corsOrigins: ""

  resources: {}

  service:
    type: ClusterIP
    nodePort: null

  # ---------------------------------------------------------------------------
  # Ingress for the Envoy gRPC-Web proxy. The browser UI calls the apiserver
  # through this path — enable alongside ui.ingress.
  # The first host's first path is used to auto-derive ui.apiBaseUrl when
  # ui.apiBaseUrl is empty.
  # ---------------------------------------------------------------------------
  ingress:
    enabled: false
    className: ""
    # Controller-specific annotations. Common patterns:
    #   nginx.ingress.kubernetes.io/rewrite-target: /$2
    #   nginx.ingress.kubernetes.io/use-regex: "true"
    #   nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    annotations: {}
    hosts: []
    # Example:
    #   hosts:
    #     - host: api.michelangelo.example.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    tls: []

# -----------------------------------------------------------------------------
# ui — React frontend served by nginx.
# -----------------------------------------------------------------------------
ui:
  enabled: true

  # REQUIRED when ui.enabled=true. Browser-reachable URL of the envoy proxy.
  # The UI loads this from /config.json at runtime — it must be reachable
  # from the user's browser, not just from inside the cluster.
  #
  # Local k3d: "http://localhost:8081"
  # Production: "https://michelangelo.example.com/api"
  apiBaseUrl: ""

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

  service:
    type: ClusterIP
    port: 80
    nodePort: null

  # ---------------------------------------------------------------------------
  # Ingress for the UI. Standard HTTP/1.1, served at the root of each host.
  # ---------------------------------------------------------------------------
  ingress:
    enabled: false
    className: ""
    annotations: {}
    # Host rules. Each entry creates one rule in spec.rules[].
    # Required when ingress.enabled=true — an empty list produces no rules.
    hosts: []
    # Example:
    #   hosts:
    #     - host: michelangelo.example.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    tls: []
    # Example:
    #   tls:
    #     - secretName: michelangelo-tls
    #       hosts:
    #         - michelangelo.example.com

# -----------------------------------------------------------------------------
# worker — Cadence/Temporal workflow client. Executes pipeline runs.
# -----------------------------------------------------------------------------
worker:
  enabled: true

  # Scale horizontally for higher pipeline-run throughput. Workers are
  # stateless; runs are distributed by the workflow engine task list.
  replicas: 1

  # Logging configuration for the worker process.
  logging:
    level: info
    development: true
    encoding: console

  resources: {}

# -----------------------------------------------------------------------------
# notification — PipelineRun state-change notification config.
#
# The notification workflow runs inside the shared worker binary on the
# "notification_worker" task list (already included in workflow.taskLists).
# Set studioBaseURL and senderEmail to enable deep links and outgoing email.
# -----------------------------------------------------------------------------
notification:
  # taskList routes notifications to the worker that handles them. Override only
  # if you register notification activities on a different task list in your fork.
  taskList: notification_worker

  # Base URL of the platform UI, used to build deep links in notifications.
  # Trailing slash is optional — normalized automatically. Leave empty to omit links.
  # Example: "https://ml.mycompany.com/studio/"
  studioBaseURL: ""

  # From address for outgoing email notifications.
  senderEmail: ""

# -----------------------------------------------------------------------------
# controllermgr — Kubernetes controller manager for Michelangelo CRDs.
# -----------------------------------------------------------------------------
controllermgr:
  enabled: true

  # Namespaces this controller manager watches.
  # Empty list = watch all namespaces (uses ClusterRole).
  # Non-empty = watch only listed namespaces (uses namespaced Role per entry).
  watchNamespace: []

  # Bind addresses for metrics and health probes.
  metricsPort: 8091
  healthPort: 8081

  # Leader election. Off by default to match the source sandbox YAML.
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

  # Kubernetes API client tuning for the rayCluster controller.
  controllers:
    rayCluster:
      qps: 300
      burst: 600

  # Metadata storage knobs (ingester). Defaults match the source sandbox YAML.
  metadataStorage:
    enable: false
    deletionDelay: 10s
    enableResourceVersionCache: false

  # Per-controller reconciliation concurrency. Override to tune throughput.
  ingester:
    concurrentReconciles: 2
    requeuePeriod: 30s
    concurrentReconcilesMap:
      PipelineRun: 10
      Deployment: 3
      Pipeline: 3
      Revision: 3

  pipeline:
    # When true, the controller snapshots a Revision CR on every successful
    # READY reconcile. Disabled by default; enable for deployments with a
    # revision store (see revision.Manager).
    revisioningEnabled: false

  # Workflow client extras (controllermgr-only).
  workflowClient:
    # Cadence Web URL template. Empty by default; set in values-k3d.yaml for
    # the local sandbox or in production to your own Cadence/Temporal UI.
    executionUrlFormat: ""

  # Ray cluster log persistence via the KubeRay collector sidecar.
  # Mirrors the Go config path: jobs.k8sengine.mapper.logPersistence
  # When enabled, the controllermgr injects a kuberay-collector container into
  # every RayCluster head + worker pod to stream logs into S3-compatible storage.
  # The History Server can then replay the Ray Dashboard for torn-down clusters.
  # Ref: https://github.com/ray-project/kuberay/tree/master/historyserver
  jobs:
    k8sengine:
      mapper:
        logPersistence:
          enabled: true

          # S3-compatible endpoint reachable from inside the cluster.
          # Defaults to objectStorage.endpoint when empty.
          storageEndpoint: ""

          # Bucket to store Ray logs (must exist before pipelines run).
          bucket: ray-history

          # Key prefix under the bucket (e.g. "log" → s3://ray-history/log/<cluster>/).
          pathPrefix: log

          # S3 region — required by the AWS SDK for SigV4 signing even with custom
          # endpoints. Defaults to objectStorage.region when empty.
          region: ""

          # Name of the Kubernetes Secret containing AWS_ACCESS_KEY_ID and
          # AWS_SECRET_ACCESS_KEY. Defaults to the chart's object-storage-credentials
          # Secret (michelangelo.objectStorageSecretName) when empty.
          credentialsSecret: ""

          # Set S3DISABLE_SSL=true on the collector. Enable for in-cluster MinIO; disable for OCI/S3.
          s3DisableSSL: true

          # Go text/template for the human-browsable log URL written to RayClusterStatus.LogUrl.
          # Available vars: {{.Bucket}}, {{.PathPrefix}}, {{.ClusterName}}, {{.RayLocalNamespace}}.
          # Empty string disables log_url emission.
          # Example (sandbox MinIO console): "http://localhost:9090/browser/{{.Bucket}}/{{.PathPrefix}}/{{.ClusterName}}_{{.RayLocalNamespace}}/"
          logURLFormat: ""

  resources: {}

# -----------------------------------------------------------------------------
# ServiceAccount used by every chart-managed Pod.
# -----------------------------------------------------------------------------
serviceAccount:
  # Create a ServiceAccount as part of this release.
  create: true

  # Override the generated name. Defaults to the release fullname.
  name: ""

  # Annotations applied to the ServiceAccount (e.g. AWS IRSA role ARN).
  annotations: {}

# -----------------------------------------------------------------------------
# Pod-level security defaults. Applied to every Pod the chart creates.
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

# Container-level security defaults. Applied to every container.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # apiserver writes ephemeral state to /tmp

# -----------------------------------------------------------------------------
# Default resource requests/limits. Override per-service in the blocks above
# for finer control.
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# -----------------------------------------------------------------------------
# Scheduling. Applied to every Pod.
# -----------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# Extra labels and annotations applied to every chart-managed object.
commonLabels: {}
commonAnnotations: {}

# -----------------------------------------------------------------------------
# Cadence — optional bundled workflow engine.
#
# When enabled, the official Cadence Helm chart (cadence-workflow/cadence
# v1.1.0) is installed as a subchart of this release. Disabled by default —
# bring your own Cadence or Temporal in production.
#
# Prerequisite: run `helm dependency update ./helm/michelangelo` once before
# the first install with cadence.enabled=true. Helm will not auto-download
# the dependency.
#
# When enabled, set `workflow.endpoint` to "<release>-cadence-frontend:7833"
# so the Michelangelo worker connects to the bundled Cadence instance.
# -----------------------------------------------------------------------------
cadence:
  # Toggle bundled Cadence. Default off — set true for self-contained installs.
  enabled: false

  # ---------------------------------------------------------------------------
  # Persistence — Cadence stores workflow state in MySQL.
  # Cadence creates TWO databases on the given host: `cadence` (workflow
  # history) and `cadence_visibility` (search/list queries). The MySQL user
  # needs CREATE DATABASE privilege, or you must pre-create both databases.
  # ---------------------------------------------------------------------------
  config:
    persistence:
      database:
        # "mysql" or "cassandra". This chart documents the MySQL path.
        driver: "mysql"

        sql:
          # Hostname of the MySQL server Cadence connects to. Can be the
          # same as `metadataStorage.host` (shared MySQL) or a separate instance.
          hosts: ""

          # MySQL port.
          port: 3306

          # Workflow history database. Auto-created by the cadence-schema job.
          dbname: cadence

          # Visibility (list/search) database. Also auto-created. Required —
          # Cadence will not start without it.
          visibilityDbname: cadence_visibility

          # MySQL user. Override to use a dedicated Cadence user.
          user: root

          # MySQL password. Typically the same as `metadataStorage.rootPassword`.
          # Pass via --set from a secrets manager — never commit.
          password: ""

  # Disable unused database backends to avoid pulling Cassandra/PostgreSQL pods.
  cassandra:
    enabled: false
  mysql:
    enabled: false
  postgresql:
    enabled: false
  elasticsearch:
    enabled: false

  # Cadence web UI. Useful for inspecting workflows. Disable to save a pod.
  web:
    enabled: true

# -----------------------------------------------------------------------------
# Temporal — optional bundled workflow engine.
#
# When enabled, the official Temporal Helm chart (temporalio/temporal v0.44.0)
# is installed as a subchart of this release. Disabled by default — bring
# your own Cadence or Temporal in production.
#
# Prerequisite: run `helm dependency build ./helm/michelangelo` once before
# the first install with temporal.enabled=true.
#
# When enabled, set workflow.engine=temporal and
# workflow.endpoint=<release>-temporal-frontend:7233
#
# IMPORTANT: temporal.enabled=true and cadence.enabled=true must not be
# set together — pick one workflow engine per release.
# -----------------------------------------------------------------------------
temporal:
  # Toggle bundled Temporal. Default off — set true for self-contained installs.
  enabled: false

  # IMPORTANT: temporal.enabled=true and cadence.enabled=true are mutually
  # exclusive. Setting both installs both subcharts but the worker only
  # talks to whichever workflow.engine names — the other sits idle and
  # wastes cluster resources. The chart fails fast if both are set.

  server:
    config:
      persistence:
        # ---------------------------------------------------------------------------
        # Point Temporal at the same MySQL instance the control plane uses.
        # Temporal creates TWO databases: `temporal` (workflow history) and
        # `temporal_visibility` (search/list queries). The MySQL user needs
        # CREATE DATABASE privilege, or pre-create both databases manually.
        #
        # IMPORTANT: Use driver "mysql8" (not "mysql") — the Temporal chart uses
        # a different driver string than the Cadence chart. Using "mysql" will
        # cause the schema tool to use a deprecated code path.
        # ---------------------------------------------------------------------------
        default:
          driver: sql
          sql:
            # "mysql8" for MySQL 8.x. Do NOT use "mysql" — that is the legacy driver.
            driver: mysql8

            # Hostname of the MySQL server. Can be the same as metadataStorage.host.
            host: ""

            # MySQL port.
            port: 3306

            # Workflow history database. Auto-created by the Temporal schema job.
            database: temporal

            # MySQL user. Needs CREATE DATABASE privilege (or pre-create the DB).
            user: root

            # MySQL password. Same as metadataStorage.rootPassword if sharing MySQL.
            # Pass via --set — never commit.
            password: ""

        visibility:
          driver: sql
          sql:
            # Same driver as default — must match. Use "mysql8", NOT "mysql".
            driver: mysql8

            # Same host as default. Mismatched hosts across default/visibility
            # cause half-broken installs (history works, list/search fails).
            host: ""

            port: 3306

            # Visibility (list/search) database. Auto-created by the schema job.
            # Required — Temporal will not start without it.
            database: temporal_visibility

            # MySQL user. Same as default.sql.user when sharing one MySQL.
            user: root

            # Same password as default.sql.password when sharing one MySQL.
            # Pass via --set — never commit.
            password: ""

  # Disable embedded Cassandra, PostgreSQL, and other backends —
  # we bring our own MySQL.
  cassandra:
    enabled: false

  mysql:
    enabled: false

  postgresql:
    enabled: false

  elasticsearch:
    enabled: false

  # Temporal web UI. Useful for inspecting workflow runs. Disable to save a pod.
  web:
    enabled: true
