{{- if .Values.apiserver.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "michelangelo.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "checking apiserver gRPC port {{ .Values.apiserver.port }}..."
          nc -zv {{ include "michelangelo.componentFullname" (dict "context" . "component" "apiserver") }} {{ .Values.apiserver.port }}
          echo "apiserver is reachable"
{{- end }}
