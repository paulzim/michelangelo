{{- if not .Values.objectStorage.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "michelangelo.objectStorageSecretName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "objectStorage.accessKeyId is required when objectStorage.existingSecret is not set — see helm/michelangelo/README.md#values-reference" .Values.objectStorage.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "objectStorage.secretAccessKey is required when objectStorage.existingSecret is not set — see helm/michelangelo/README.md#values-reference" .Values.objectStorage.secretAccessKey | quote }}
{{- end }}
