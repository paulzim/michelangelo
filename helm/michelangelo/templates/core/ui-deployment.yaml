{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "ui") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "michelangelo.componentLabels" (dict "context" . "component" "ui") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "michelangelo.componentSelectorLabels" (dict "context" . "component" "ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "michelangelo.componentSelectorLabels" (dict "context" . "component" "ui") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "michelangelo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "michelangelo.image" (dict "repository" .Values.images.ui.repository "tag" .Values.images.ui.tag "Chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: public-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
          {{- with (or .Values.ui.resources .Values.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: public-config
          configMap:
            name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "ui-config") }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
