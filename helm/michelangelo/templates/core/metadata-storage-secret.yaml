{{- if and .Values.metadataStorage.rootPassword (not .Values.metadataStorage.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-metadata-storage" (include "michelangelo.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.metadataStorage.rootPassword | quote }}
{{- end }}
