{{- if .Values.envoy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "envoy-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "michelangelo.componentLabels" (dict "context" . "component" "envoy") | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: michelangelo-ui-listener
          address:
            socket_address: { address: 0.0.0.0, port_value: {{ .Values.envoy.port }} }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: michelangelo-apiserver
                                max_grpc_timeout: 0s
                          cors:
                            allow_origin_string_match:
                              - safe_regex:
                                  regex: {{ .Values.envoy.corsOrigins | default ".*" | quote }}
                            allow_methods: "GET, POST, OPTIONS"
                            allow_headers: "connect-protocol-version,connect-timeout-ms,content-type,context-ttl-ms,grpc-timeout,rpc-caller,rpc-encoding,rpc-service,x-grpc-web,x-user-agent"
                            max_age: "1728000"
                            expose_headers: "grpc-status,grpc-message"
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: michelangelo-apiserver
          connect_timeout: 1s
          type: LOGICAL_DNS
          http2_protocol_options: {}
          {{- if .Values.apiserver.tls.enabled }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                validation_context:
                  trust_chain_verification: ACCEPT_UNTRUSTED
          {{- end }}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: michelangelo-apiserver
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "michelangelo.componentFullname" (dict "context" . "component" "apiserver") }}
                          port_value: {{ .Values.apiserver.port }}
{{- end }}
