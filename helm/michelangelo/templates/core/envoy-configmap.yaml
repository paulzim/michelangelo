{{- if .Values.envoy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "envoy-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "michelangelo.componentLabels" (dict "context" . "component" "envoy") | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: michelangelo-ui-listener
          address:
            socket_address: { address: 0.0.0.0, port_value: {{ .Values.envoy.port }} }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: michelangelo-apiserver
                                max_grpc_timeout: 0s
                          cors:
                            allow_origin_string_match:
                              - safe_regex:
                                  regex: {{ .Values.envoy.corsOrigins | default ".*" | quote }}
                            allow_methods: "GET, POST, OPTIONS"
                            allow_headers: "connect-protocol-version,connect-timeout-ms,content-type,context-ttl-ms,grpc-timeout,rpc-caller,rpc-encoding,rpc-service,x-grpc-web,x-user-agent"
                            max_age: "1728000"
                            expose_headers: "grpc-status,grpc-message"
                    http_filters:
                      # Converts JSON requests from the browser into binary proto
                      # for the YARPC backend, and binary proto responses back to
                      # JSON. This keeps gogo jsonpb out of the serialization path,
                      # avoiding mismatches between k8s types (metav1.Time, etc.)
                      # and standard proto JSON encoding.
                      - name: envoy.filters.http.grpc_json_transcoder
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                          proto_descriptor: "/etc/envoy-descriptors/descriptors.pb"
                          # Allowlist of services the transcoder will handle.
                          # Requests to unlisted services pass through untranscoded.
                          # TODO(#1471): generate this list from descriptors.pb at build time.
                          services:
                            - "michelangelo.api.v2.CachedOutputService"
                            - "michelangelo.api.v2.ClusterService"
                            - "michelangelo.api.v2.DeploymentService"
                            - "michelangelo.api.v2.EvaluationReportService"
                            - "michelangelo.api.v2.InferenceServerService"
                            - "michelangelo.api.v2.ModelFamilyService"
                            - "michelangelo.api.v2.ModelService"
                            - "michelangelo.api.v2.PipelineRunService"
                            - "michelangelo.api.v2.PipelineService"
                            - "michelangelo.api.v2.ProjectService"
                            - "michelangelo.api.v2.RayClusterService"
                            - "michelangelo.api.v2.RayJobService"
                            - "michelangelo.api.v2.RevisionService"
                            - "michelangelo.api.v2.SparkJobService"
                            - "michelangelo.api.v2.TriggerRunService"
                          # Generate POST /{service}/{method} bindings for every
                          # method automatically, so protos don't need
                          # google.api.http annotations.
                          auto_mapping: true
                          # Use the route Envoy already matched (prefix: "/")
                          # instead of building a second internal route table
                          # from the HTTP bindings. Without this, the transcoder
                          # and the route config act as two independent routers
                          # that can disagree.
                          match_incoming_request_route: true
                          # Map gRPC status codes to HTTP status codes (e.g.
                          # NOT_FOUND→404) and surface errors as JSON bodies.
                          # Without this, all responses are HTTP 200 with status
                          # buried in trailers that browsers can't read.
                          convert_grpc_status: true
                          print_options:
                            # Use camelCase field names (proto3 JSON default)
                            # instead of snake_case proto field names.
                            preserve_proto_field_names: false
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: michelangelo-apiserver
          connect_timeout: 1s
          type: LOGICAL_DNS
          http2_protocol_options: {}
          {{- if .Values.apiserver.tls.enabled }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                validation_context:
                  trust_chain_verification: ACCEPT_UNTRUSTED
          {{- end }}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: michelangelo-apiserver
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "michelangelo.componentFullname" (dict "context" . "component" "apiserver") }}
                          port_value: {{ .Values.apiserver.port }}
{{- end }}
