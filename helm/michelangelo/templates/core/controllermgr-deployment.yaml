{{- if .Values.controllermgr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "controllermgr") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "michelangelo.componentLabels" (dict "context" . "component" "controllermgr") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "michelangelo.componentSelectorLabels" (dict "context" . "component" "controllermgr") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/core/controllermgr-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "michelangelo.componentSelectorLabels" (dict "context" . "component" "controllermgr") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "michelangelo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ .Values.images.controllermgr }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.objectStorage.existingSecret | default (include "michelangelo.objectStorageSecretName" .) }}
          env:
            - name: CONFIG_DIR
              value: /config
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metadataStorage.existingSecret | default (printf "%s-metadata-storage" (include "michelangelo.fullname" .)) }}
                  key: password
          ports:
            - name: metrics
              containerPort: {{ .Values.controllermgr.metricsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.controllermgr.healthPort }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
          {{- with (or .Values.controllermgr.resources .Values.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "michelangelo.componentFullname" (dict "context" . "component" "controllermgr-config") }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
