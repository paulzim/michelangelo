controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8091}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8083}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: localhost:7833
  transport: grpc
  domain: default
  # taskList is a used as a fallback if project.Metatdata.Annotations["michelangelo/worker_queue"] is empty
  taskList: default # TODO(#934): MaCTL support for adding project.Metatdata.Annotations["michelangelo/worker_queue"] to project CRD
  executionUrlFormat: http://localhost:8088/namespaces/{{.Domain}}/workflows/{{.ExecutionID}}

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

ingester:
  concurrentReconciles: 1
  requeuePeriod: 30s

pipelineRun:
  # ttlDays: 0  # 0 disables TTL eviction; set e.g. 30 to evict runs older than 30 days

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

# k8sengine mapper config — consumed by go/components/jobs/client/k8sengine.
# logPersistence drives both the collector-sidecar injection (mapRayCluster)
# and the human-browsable log_url computation (MapLocalClusterStatusToGlobal).
jobs:
  k8sengine:
    mapper:
      logPersistence:
        enabled: true
        storageEndpoint: "k3d-michelangelo-sandbox-agent-0:30007"
        bucket: ray-history
        pathPrefix: log
        region: us-east-1
        credentialsSecret: minio-credentials
        collectorImage: kuberay-collector:v0.1.0
        s3DisableSSL: true
        # logURLFormat is a Go text/template that builds the human-browsable
        # log URL. Available vars: {{.Bucket}}, {{.PathPrefix}}, {{.ClusterName}},
        # {{.RayLocalNamespace}}. Sandbox default points at the in-cluster MinIO
        # console; production overlays point at OCI Object Storage / S3 console.
        logURLFormat: "http://localhost:9090/browser/{{.Bucket}}/{{.PathPrefix}}/{{.ClusterName}}_{{.RayLocalNamespace}}/"

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: localhost:9091

inferenceServer:
  gateway:
    # Istio's Gateway controller materializes a Service named '<gateway>-istio'
    # for each Gateway resource. The IS controller's EndpointSource reads the
    # NodePort + node InternalIP of this Service to publish per-cluster
    # EndpointSlices in the control plane.
    serviceName: ma-gateway-istio
    serviceNamespace: default
    portName: http