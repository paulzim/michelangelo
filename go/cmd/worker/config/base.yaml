worker:
  address: localhost:15566
  maApiServiceName: ma-apiserver

logging:
  level: info
  development: true
  encoding: console

workflow-engine:
  # for cadence
  host: 127.0.0.1:7833
  # for temporal
#  host: 127.0.0.1:7233
  transport: grpc
  # for cadence
  provider: cadence
    # for temporal
#  provider: temporal
  workers:
    - domain: default
      taskList: default
    - domain: default
      taskList: trigger_run
    - domain: default
      taskList: pipeline_run  # Deprecated: will be removed in a future release. Kept for backward compatibility with currently deployed systems.
    - domain: default
      taskList: notification_worker
  client:
    domain: default

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: localhost:9091

