repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff linter
        entry: bash tools/run_ruff.sh check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff formatter
        entry: bash tools/run_ruff.sh format
        language: system
        types: [python]
      - id: prettier
        name: prettier formatter
        entry: bash -c 'cd javascript && yarn prettier --write --log-level warn .'
        language: system
        files: ^javascript/
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: bash -c 'cd javascript && yarn lint --fix --quiet'
        language: system
        files: ^javascript/
        pass_filenames: false
      - id: gofmt
        name: go formatter
        entry: gofmt -l -w
        language: system
        files: ^go/.*\.go$
      - id: go-vet
        name: go vet
        entry: bash -c 'cd go && go vet ./...'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false
