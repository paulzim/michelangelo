repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff linter
        entry: bash tools/run_ruff.sh check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff formatter
        entry: bash tools/run_ruff.sh format
        language: system
        types: [python]
      - id: prettier
        name: prettier formatter
        entry: bash -c 'cd javascript && yarn prettier --write --log-level warn .'
        language: system
        files: ^javascript/
        pass_filenames: false
