repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff linter
        entry: bash tools/run_ruff.sh check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff formatter
        entry: bash tools/run_ruff.sh format
        language: system
        types: [python]
      - id: prettier
        name: prettier formatter
        entry: bash -c 'cd javascript && yarn prettier --write "${@#javascript/}"' --
        language: system
        types_or: [ts, tsx, javascript, jsx, json, css, yaml, markdown]
        files: ^javascript/
        pass_filenames: true
