---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-config
data:
  MA_FILE_SYSTEM: s3://default
  MA_FILE_SYSTEM_S3_SCHEME: http
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_ENDPOINT_URL: http://minio:9091
  # Model registry endpoint for push_step-style tasks. Without this,
  # push.py silently falls back to an in-memory, non-persisted registry
  # client instead of registering via the real apiserver API.
  REGISTRY_ENDPOINT: "michelangelo-apiserver:15566"
