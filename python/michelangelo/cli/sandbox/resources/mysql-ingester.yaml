        KEY `trigger_run_state` (`state`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    CREATE TABLE IF NOT EXISTS `trigger_run_labels` (
        `id` BIGINT NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key` VARCHAR(255) NOT NULL,
        `value` VARCHAR(63),
        PRIMARY KEY (`id`),
        KEY `trigger_run_labels_uid` (`obj_uid`),
        KEY `trigger_run_labels_key_value` (`key`, `value`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    CREATE TABLE IF NOT EXISTS `trigger_run_annotations` (
        `id` BIGINT NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key` VARCHAR(255) NOT NULL,
        `value` TEXT,
        PRIMARY KEY (`id`),
        KEY `trigger_run_annotations_uid` (`obj_uid`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    -- ==============================================================================
    -- 14. EVALUATION_REPORT
    -- ==============================================================================
    CREATE TABLE IF NOT EXISTS `evaluation_report` (
        `uid` VARCHAR(255) NOT NULL,
        `group_ver` VARCHAR(255) NOT NULL,
        `namespace` VARCHAR(255) NOT NULL,
        `name` VARCHAR(255) NOT NULL,
        `res_version` BIGINT UNSIGNED NOT NULL,
        `create_time` DATETIME NOT NULL,
        `update_time` DATETIME,
        `delete_time` DATETIME,
        `proto` MEDIUMBLOB,
        `json` JSON,
        PRIMARY KEY (`uid`),
        KEY `evaluation_report_namespace_name` (`namespace`, `name`),
        KEY `evaluation_report_create_time` (`create_time`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

    CREATE TABLE IF NOT EXISTS `evaluation_report_labels` (
        `id` BIGINT NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key` VARCHAR(255) NOT NULL,
        `value` VARCHAR(63),
        PRIMARY KEY (`id`),
        KEY `evaluation_report_labels_uid` (`obj_uid`),
        KEY `evaluation_report_labels_key_value` (`key`, `value`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

    CREATE TABLE IF NOT EXISTS `evaluation_report_annotations` (
        `id` BIGINT NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key` VARCHAR(255) NOT NULL,
        `value` TEXT,
        PRIMARY KEY (`id`),
        KEY `evaluation_report_annotations_uid` (`obj_uid`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

    -- ==============================================================================
    -- SUMMARY
    -- ==============================================================================
    SELECT 'Complete schema initialization finished!' as status;
    SELECT COUNT(*) as table_count FROM information_schema.tables 
    WHERE table_schema = 'michelangelo';
    
    SELECT table_name, table_rows 
    FROM information_schema.tables 
    WHERE table_schema = 'michelangelo' 
    ORDER BY table_name;

---
# Kubernetes Job to initialize the ingester schema  
apiVersion: batch/v1
kind: Job
metadata:
  name: ingester-schema-init
  namespace: default
  labels:
    component: schema-init
  annotations:
    description: "Initializes MySQL schema for Michelangelo ingester - ALL 15 CRDs"
spec:
  # Keep completed job for 24 hours for debugging
  ttlSecondsAfterFinished: 86400
  
  # Retry up to 3 times if it fails
  backoffLimit: 3
  
  template:
    metadata:
      labels:
        component: schema-init
    spec:
      restartPolicy: OnFailure
      
      # Use init container to wait for MySQL to be ready
      initContainers:
        - name: wait-for-mysql
          image: mysql:8
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              MAX_ATTEMPTS=60
              ATTEMPT=0
              
              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                if mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} -e "SELECT 1" &>/dev/null; then
                  echo "✓ MySQL is ready!"
                  exit 0
                fi
                ATTEMPT=$((ATTEMPT + 1))
                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: MySQL not ready, waiting..."
                sleep 2
              done
              
              echo "✗ MySQL did not become ready after $MAX_ATTEMPTS attempts"
              exit 1
          env:
            - name: MYSQL_HOST
              value: "mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "root"
      
      containers:
        - name: schema-init
          image: mysql:8
          command:
            - /bin/bash
            - -c
            - |
              echo "========================================="
              echo "Ingester Schema Initialization"
              echo "Initializing ALL 15 CRD tables"
              echo "========================================="
              echo ""
              echo "MySQL Host: ${MYSQL_HOST}"
              echo "MySQL Port: ${MYSQL_PORT}"
              echo "MySQL User: ${MYSQL_USER}"
              echo "Database: ${MYSQL_DATABASE}"
              echo ""
              
              echo "Executing schema SQL..."
              if mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} < /scripts/init-schema.sql; then
                echo ""
                echo "✓ Schema initialization successful!"
                echo ""
                
                # Verify tables were created
                echo "Verifying tables..."
                TABLE_COUNT=$(mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} ${MYSQL_DATABASE} \
                  -sN -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${MYSQL_DATABASE}' AND table_name NOT LIKE '%_labels' AND table_name NOT LIKE '%_annotations';")
                
                echo "Main tables created: $TABLE_COUNT / 15"

                echo ""
                echo "Tables created:"
                mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} ${MYSQL_DATABASE} \
                  -e "SHOW TABLES;" | grep -v "Tables_in\|_labels\|_annotations" | sed 's/^/  - /'

                if [ "$TABLE_COUNT" -eq "15" ]; then
                  echo ""
                  echo "========================================="
                  echo "✓ All 15 CRD tables ready!"
                  echo "========================================="
                  exit 0
                else
                  echo ""
                  echo "⚠ Warning: Expected 15 tables but found $TABLE_COUNT"
                  exit 0
                fi
              else
                echo ""
                echo "✗ Schema initialization failed!"
                exit 1
              fi
          env:
            - name: MYSQL_HOST
              value: "mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_DATABASE
              value: "michelangelo"
            - name: MYSQL_PASSWORD
              value: "root"
          volumeMounts:
            - name: schema-scripts
              mountPath: /scripts
              readOnly: true
      
      volumes:
        - name: schema-scripts
          configMap:
            name: ingester-schema-init
