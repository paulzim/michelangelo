---
apiVersion: v1
kind: Pod
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  containers:
    - name: app
      image: ghcr.io/michelangelo-ai/controllermgr:main
      envFrom:
        - secretRef:
            name: minio-credentials
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: michelangelo-controllermgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  selector:
    app: michelangelo-controllermgr
  ports:
  - name: metrics
    port: 8091
    targetPort: 8091
  - name: health
    port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-controllermgr-config
  labels:
    app: michelangelo-controllermgr
data:
  base.yaml: |
    controllermgr:
      metricsBindAddress: ${METRICS_ADDRESS::8091}
      healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
      leaderElection: false
      leaderElectionID: decaf1259.michelangelo.uber.com

    controllers:
      rayCluster:
        k8sQps: 300
        k8sBurst: 600

    # k8sengine mapper config — drives collector sidecar injection and
    # the human-browsable log_url computation.
    jobs:
      k8sengine:
        mapper:
          logPersistence:
            enabled: true
            storageEndpoint: "k3d-michelangelo-sandbox-agent-0:30007"
            bucket: ray-history
            pathPrefix: log
            region: us-east-1
            credentialsSecret: minio-credentials
            collectorImage: kuberay-collector:v0.1.0
            s3DisableSSL: true
            logURLFormat: "http://localhost:9090/browser/{{.Bucket}}/{{.PathPrefix}}/{{.ClusterName}}_{{.RayLocalNamespace}}/"

    minio:
      awsRegion: us-east-1
      awsAccessKeyId: ${AWS_ACCESS_KEY_ID::minioadmin}
      awsSecretAccessKey: ${AWS_SECRET_ACCESS_KEY::minioadmin}
      awsEndpointUrl: minio:9091
    
    workflowClient:
      service: temporal-frontend
      host: temporaltest-frontend:7233
      transport: grpc
      domain: default
      provider: Temporal
