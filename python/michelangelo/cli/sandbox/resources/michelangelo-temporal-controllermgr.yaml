---
apiVersion: v1
kind: Pod
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  containers:
    - name: app
      image: ghcr.io/michelangelo-ai/controllermgr:main
      envFrom:
        - secretRef:
            name: minio-credentials
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: michelangelo-controllermgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  selector:
    app: michelangelo-controllermgr
  ports:
  - name: metrics
    port: 8091
    targetPort: 8091
  - name: health
    port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-controllermgr-config
  labels:
    app: michelangelo-controllermgr
data:
  base.yaml: |
    controllermgr:
      metricsBindAddress: ${METRICS_ADDRESS::8091}
      healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
      leaderElection: false
      leaderElectionID: decaf1259.michelangelo.uber.com

    controllers:
      rayCluster:
        k8sQps: 300
        k8sBurst: 600

    minio:
      awsRegion: us-east-1
      awsAccessKeyId: ${AWS_ACCESS_KEY_ID::minioadmin}
      awsSecretAccessKey: ${AWS_SECRET_ACCESS_KEY::minioadmin}
      awsEndpointUrl: minio:9091
    
    workflowClient:
      service: temporal-frontend
      host: temporaltest-frontend:7233
      transport: grpc
      domain: default
      provider: Temporal

    inferenceServer:
      gateway:
        # Istio's Gateway controller materializes a Service named '<gateway>-istio'
        # for each Gateway resource. The IS controller's EndpointSource reads the
        # NodePort + node InternalIP of this Service to publish per-cluster
        # EndpointSlices in the control plane.
        serviceName: ma-gateway-istio
        serviceNamespace: default
        portName: http
