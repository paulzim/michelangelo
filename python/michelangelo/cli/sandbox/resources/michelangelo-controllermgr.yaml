---
apiVersion: v1
kind: Pod
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  containers:
    - name: app
      image: ghcr.io/michelangelo-ai/controllermgr:main
      imagePullPolicy: IfNotPresent
      envFrom:
        - secretRef:
            name: minio-credentials
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: michelangelo-controllermgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  selector:
    app: michelangelo-controllermgr
  ports:
  - name: metrics
    port: 8091
    targetPort: 8091
  - name: health
    port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-controllermgr-config
  labels:
    app: michelangelo-controllermgr
data:
  base.yaml: |
    controllermgr:
      metricsBindAddress: ${METRICS_ADDRESS::8091}
      healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
      leaderElection: false
      leaderElectionID: decaf1259.michelangelo.uber.com

    controllers:
      rayCluster:
        k8sQps: 300
        k8sBurst: 600

    minio:
      awsRegion: us-east-1
      awsAccessKeyId: ${AWS_ACCESS_KEY_ID::minioadmin}
      awsSecretAccessKey: ${AWS_SECRET_ACCESS_KEY::minioadmin}
      awsEndpointUrl: minio:9091

    # Reuse the Cadence MySQL service for ingester metadata storage in sandbox.
    metadataStorage:
      enableMetadataStorage: true
      deletionDelay: 10s
      enableResourceVersionCache: false

    mysql:
      host: mysql
      port: 3306
      user: root
      password: root
      database: michelangelo

    ingester:
      # Legacy global defaults (still supported for backwards compatibility)
      concurrentReconciles: 2
      requeuePeriod: 30s

      # New per-controller configuration (recommended)
      # Controllers not listed here will use the global defaults above
      concurrentReconcilesMap:
        PipelineRun: 10    # High-throughput workload
        Deployment: 3      # Medium concurrency
        Pipeline: 3        # Medium concurrency
        Revision: 3        # Medium concurrency
        # Model: 5         # Example: uncomment to override Model concurrency
        # InferenceServer: 2  # Example: uncomment to override InferenceServer

      # Optional: per-controller requeue periods
      # requeuePeriodMap:
      #   Deployment: 60s
      #   Pipeline: 45s

    workflowClient:
      service: cadence-frontend
      host: cadence:7833
      transport: grpc
      domain: default
      taskList: default
      executionUrlFormat: http://localhost:8088/namespaces/{{.Domain}}/workflows/{{.ExecutionID}}

    inferenceServer:
      gateway:
        # Istio's Gateway controller materializes a Service named '<gateway>-istio'
        # for each Gateway resource. The IS controller's EndpointSource reads the
        # NodePort + node InternalIP of this Service to publish per-cluster
        # EndpointSlices in the control plane.
        serviceName: ma-gateway-istio
        serviceNamespace: default
        portName: http
