apiVersion: "batch/v1"
kind: "Job"
metadata:
  name: "sandbox-bucket-setup"
spec:
  template:
    spec:
      containers:
        # Container to set up sandbox S3 buckets. To inspect logs, use the following command:
        # `kubectl logs job.batch/sandbox-bucket-setup`
        - name: "bucket-setup"
          image: "amazon/aws-cli:latest"
          command:
            - "/bin/bash"
          args:
            - "/scripts/bucket-setup.sh"
          env:
            - name: "AWS_ENDPOINT_URL"
              value: "http://minio:9091"
            - name: "BUCKET_NAMES"
              value: "logs,default,deploy-models,michelangelo"
            - name: "PUBLIC"
              value: "true"
          volumeMounts:
            - name: "aws-credentials-volume"
              mountPath: "/root/.aws"
            - name:  "scripts-volume"
              mountPath: "/scripts"
          imagePullPolicy: "IfNotPresent"
      restartPolicy: "Never"
      volumes:
        - name: "aws-credentials-volume"
          secret:
            secretName: "aws-credentials"
        - name: "scripts-volume"
          configMap:
            name: "sandbox-bucket-setup"
---
apiVersion: v1
data:
  bucket-setup.sh: |-
    #!/usr/bin/env bash

    # Sets up essential S3 buckets for the Michelangelo sandbox environment
    # Creates both 'logs', 'default' and 'deploy-models' buckets with optional public read access
    # on the MinIO S3-compatible object store
    #
    # Requirements:
    #
    # * AWS CLI authentication configured using any supported method---for example:
    #   * A credentials file in $HOME/.aws/credentials
    #   * AWS_CONFIG_FILE pointing to a custom credentials file
    #   * Environment variables AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
    # * Environment variables:
    #   * AWS_ENDPOINT_URL: The S3-compatible object store endpoint URL
    #   * BUCKET_NAMES: Comma-separated list of bucket names to be created
    #     * NOTE: This script will make the buckets publicly readable if PUBLIC=true.
    #   * PUBLIC (Optional): If set to "true", configures buckets with public read policy
    set -e
    set -o pipefail
    set -u

    # Emits a log event to stderr with an auto-generated ISO timestamp as well as the given level
    # and message.
    #
    # @param $1: Level string
    # @param $2: Message to be logged
    log() {
        local -r LEVEL=$1
        local -r MESSAGE=$2
        echo "$(date --utc --date="now" +"%Y-%m-%dT%H:%M:%SZ") [${LEVEL}] ${MESSAGE}" >&2
    }

    # Waits for the S3 endpoint to be available, or exits if it's unavailable.
    wait_for_s3_availability() {
        # Check availability by listing available buckets
        log "INFO" "Waiting until ${AWS_ENDPOINT_URL} endpoint becomes available."
        local -r MAX_RETRIES=10
        local -r RETRY_DELAY_IN_SECS=6
        for ((retries = 0; retries < MAX_RETRIES; retries++)); do
            if aws s3 ls --endpoint-url "$AWS_ENDPOINT_URL" >/dev/null; then
                return
            fi
            log "WARN" "S3 API endpoint unavailable. Retrying in ${RETRY_DELAY_IN_SECS} seconds."

            sleep "$RETRY_DELAY_IN_SECS"
        done

        if [[ $retries -eq $MAX_RETRIES ]]; then
            log "ERROR" "Maximum retries reached. S3 API endpoint ${AWS_ENDPOINT_URL} didn't respond."
            exit 1
        fi
    }

    # Creates a bucket
    create_bucket() {
        local -r bucket_name=$1
        local -r bucket_s3_uri="s3://${bucket_name}"
        # Create bucket if it doesn't already exist
        log "INFO" "Creating ${bucket_s3_uri} bucket."
        if ! aws s3api head-bucket --endpoint-url "$AWS_ENDPOINT_URL" --bucket "$bucket_name" \
            2>/dev/null; then
            aws s3api create-bucket --endpoint-url "$AWS_ENDPOINT_URL" --bucket "$bucket_name"
        fi
    }

    # Configures a bucket with public read access
    configure_bucket() {
        local -r bucket_name=$1
        local -r bucket_s3_uri="s3://${bucket_name}"
        # Define and apply the bucket policy for public read access
        log "INFO" "Applying public read access policy to ${bucket_s3_uri}"
        local -r POLICY=$(
            cat <<EOP
    {
        "Version": "2012-10-17",
        "Statement": [
            {
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::${bucket_name}/*"
            }
        ]
    }
    EOP
        )
        if ! aws s3api put-bucket-policy \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --bucket "$bucket_name" \
            --policy "$POLICY"; then
            log "ERROR" "Failed to set bucket policy for ${bucket_s3_uri}"
            exit 1
        fi
    }

    # Validate required environment variables
    readonly REQUIRED_ENV_VARS=(
        # Example: "http://minio:9000"
        "AWS_ENDPOINT_URL"

        # Example: "logs,default"
        "BUCKET_NAMES"
    )
    for var in "${REQUIRED_ENV_VARS[@]}"; do
        if ! [[ -v "$var" ]]; then
            log "ERROR" "$var environment variable must be set."
            exit 1
        fi
    done

    # Parse bucket names from comma-separated list
    IFS=',' read -ra BUCKET_ARRAY <<< "$BUCKET_NAMES"

    wait_for_s3_availability

    # Create each bucket
    for bucket_name in "${BUCKET_ARRAY[@]}"; do
        # Trim whitespace
        bucket_name=$(echo "$bucket_name" | xargs)
        create_bucket "$bucket_name"
        if [[ "${PUBLIC:-false}" = "true" ]]; then
            configure_bucket "$bucket_name"
        fi
        log "INFO" "Bucket ${bucket_name} created and configured successfully."
    done

    log "INFO" "All buckets created successfully: ${BUCKET_NAMES}"
kind: ConfigMap
metadata:
  name: sandbox-bucket-setup
