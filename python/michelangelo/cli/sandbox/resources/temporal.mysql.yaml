# Global environment variables for all containers including schema jobs
env:
  - name: MYSQL_HOST
    value: mysql
  - name: MYSQL_PORT
    value: "3306"
  - name: MYSQL_USER
    value: root
  - name: MYSQL_PWD
    value: root

server:
  config:
    persistence:
      default:
        driver: "sql"
        sql:
          driver: "mysql8"
          host: mysql
          port: 3306
          database: temporal
          user: root
          password: root
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: "sql"
        sql:
          driver: "mysql8"
          host: mysql
          port: 3306
          database: temporal_visibility
          user: root
          password: root
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"

# Disable automatic schema setup due to Helm chart env var bugs
# Schema will be created via admin tools container in sandbox.py
schema:
  createDatabase:
    enabled: false
  setup:
    enabled: false
  update:
    enabled: false
