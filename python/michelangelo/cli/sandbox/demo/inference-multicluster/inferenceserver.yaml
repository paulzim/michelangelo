apiVersion: michelangelo.api/v2
kind: InferenceServer
metadata:
  name: inference-server-multicluster
  namespace: default
  labels:
    app: inference-server
spec:
  tenancyType: TENANCY_TYPE_DEDICATED
  backendType: BACKEND_TYPE_TRITON
  ownerSpec:
    tier: 1
  initSpec:
    resourceSpec:
      cpu: 2
      memory: "4Gi"
    servingSpec:
      version: "latest"
    numInstances: 1
  decomSpec:
    decommission: false
  owner:
    name: "user-example"
  clusterTargets:
  # Control-plane k3d cluster, addressed via the in-cluster API server.
  - clusterId: michelangelo-sandbox
    kubernetes:
      host: https://kubernetes.default.svc
      port: "443"
      tokenTag: cluster-michelangelo-sandbox-is-token
      caDataTag: cluster-michelangelo-sandbox-ca-data
  # Remote k3d cluster, addressed via its server container hostname on the
  # shared k3d-michelangelo-sandbox docker network. The container name pattern
  # is `k3d-<cluster-name>-server-0` and the API server listens on 6443.
  - clusterId: inference-cluster-1
    kubernetes:
      host: https://k3d-inference-cluster-1-server-0
      port: "6443"
      tokenTag: cluster-inference-cluster-1-is-token
      caDataTag: cluster-inference-cluster-1-ca-data
