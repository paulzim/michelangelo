# Build and upload release when a version tag (a tag starting with v) is pushed
name: build-release
on:
  push:
    tags: ["v*"]
jobs:
  build-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./python
    steps:
      #----------------------------------------------
      #  Checkout repository first (required for local actions)
      #----------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git operations
      #----------------------------------------------
      #  Setup Python and Poetry using composite action
      #----------------------------------------------
      - name: Setup Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          working-directory: './python'
      #----------------------------------------------
      #  Build the wheel file
      #----------------------------------------------
      - run: |
          poetry build -f wheel
      #----------------------------------------------
      #  Publish to PyPI
      #----------------------------------------------
      - name: Configure PyPI token
        run: poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI
        run: poetry publish --no-interaction
      #----------------------------------------------
      #  Upload the wheel file to the release
      #----------------------------------------------
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: python/dist/*.whl

  build-go-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [apiserver, worker, controllermgr]
        os: [linux, darwin]
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          BIN: ${{ github.workspace }}/${{ matrix.service }}-${{ matrix.os }}-${{ matrix.arch }}
        run: go build -o "$BIN" ./cmd/${{ matrix.service }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.service }}-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 1

  upload-binaries:
    needs: build-go-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd binaries
          sha256sum ./* > checksums-sha256.txt

      - name: Attach binaries and checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: binaries/*

  helm-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          helm registry login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Add Helm dependency repos
        run: |
          helm repo add cadence https://cadence-workflow.github.io/cadence-charts
          helm repo add temporal https://go.temporal.io/helm-charts
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build helm/michelangelo

      - name: Package Helm chart
        run: |
          helm package helm/michelangelo \
            --version ${{ steps.version.outputs.VERSION }} \
            --app-version ${{ steps.version.outputs.VERSION }}

      - name: Push chart to OCI registry
        run: |
          helm push \
            michelangelo-${{ steps.version.outputs.VERSION }}.tgz \
            oci://ghcr.io/michelangelo-ai/michelangelo/charts

  notify-on-failure:
    needs: [build-upload, build-go-binaries, upload-binaries, helm-publish]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: 'C0BER0RCQ8P'
          slack-message: |
            :x: *${{ github.workflow }}* failed for ${{ github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
