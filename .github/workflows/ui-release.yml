name: UI Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: ['v*']
    paths:
      - 'javascript/**'

env:
  REGISTRY: ghcr.io

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      new-version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if package.json version changed
        id: check
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -q "javascript/app/package.json"; then
            # Get the current version
            VERSION=$(jq -r '.version' javascript/app/package.json)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 Package.json version changed to: $VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📦 Package.json version unchanged, skipping build"
          fi

  build-ui-image:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/michelangelo-ai/ui
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss' tz='UTC'}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=ref,prefix=pr-,event=pr
            type=raw,value=v${{ needs.check-version-change.outputs.new-version }},enable={{is_default_branch}}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: 'yarn'
          cache-dependency-path: javascript/yarn.lock

      - name: Set up buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UI Assets
        run: |
          cd javascript
          yarn setup
          yarn workspace @michelangelo/app build
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}

      - name: Build & Push UI Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ui-prebuilt.Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
