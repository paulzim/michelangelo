name: Dev Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - 'javascript/**'
      - 'python/**'
#  pull_request:
#    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  push-service-container-images:
    runs-on: ubuntu-24.04
    strategy:
      # max-parallel: 1
      matrix:
        service: [controllermgr, worker, apiserver]

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Repository
        uses: actions/checkout@v4  # https://github.com/actions/checkout

      - name: Cache Bazel Outputs
        uses: actions/cache@v4  # https://github.com/actions/cache
        with:
          path: ~/.cache/bazel
          key: bazel-release-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-release-${{ runner.os }}-

      - name: ${{ matrix.service }} / Build  Binary
        run: |
          ./tools/bazel build //go/cmd/${{ matrix.service }}
          cp bazel-bin/go/cmd/${{ matrix.service }}/${{ matrix.service }}_/${{ matrix.service }} ${{ matrix.service }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ${{ matrix.service }} / Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/michelangelo-ai/${{ matrix.service }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss' tz='UTC'}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=ref,prefix=pr-,event=pr

      - name: ${{ matrix.service }} / Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/service.Dockerfile
          build-args: |
            BINARY_PATH=${{ matrix.service }}
            CONFIG_PATH=go/cmd/${{ matrix.service }}/config
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
