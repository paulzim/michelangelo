name: Python Ruff Lint & Format

on:
  pull_request:
    branches: [main, 'release/v*']
    paths:
      - 'python/**'
      - '.github/workflows/lint.yaml'

jobs:

  
  ruff:
    name: Python Run Ruff on Changed Files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # For commenting on PRs
      contents: read

    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50      # Fetch 50 max commits in single PR

      - name: Fetch main branch
        run: git fetch origin main 

      - name: Check branch list
        run: git branch -av

      #----------------------------------------------
      #  Setup Python and Poetry using composite action
      #----------------------------------------------
      - name: Setup Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          working-directory: './python'

      #----------------------------------------------
      # Run ruff on changed files
      #----------------------------------------------
      - name: Get base SHA for comparison
        id: get-base-sha
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          echo "BASE_SHA=$BASE_SHA" >> $GITHUB_ENV

      - name: Get changed files
        id: changed-files
        run: |
          echo "Comparing changes from $BASE_SHA to HEAD"
          CHANGED_FILES_PRE=$(git diff --name-only --diff-filter=ACMRT $BASE_SHA HEAD | grep -E '\.py$' || true)
          echo "Raw Changed files:"
          echo "$CHANGED_FILES_PRE"

          # Check if there are any changed files
          if [ -z "$CHANGED_FILES_PRE" ]; then
              CHANGED_FILES=""
          else
              # Filter out files in michelangelo/gen/
              CHANGED_FILES=$(echo "$CHANGED_FILES_PRE" | grep -vE '^python/michelangelo/gen/' | awk '
              {
                  if ($0 ~ /^python\//) {
                      sub(/^python\//, "", $0);
                      print $0;
                  } else {
                      print "../"$0;
                  }
              }')
          fi

          echo "Filtered Changed files:"
          echo "$CHANGED_FILES"
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run ruff format check (without applying)
        if: env.CHANGED_FILES != ''
        id: ruff-format
        run: |
          output=$(poetry run ruff format --diff $CHANGED_FILES || true)
          echo "$output" | tee ruff_format_output.txt
          echo "RUFF_FORMAT_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run ruff lint on changed files
        if: env.CHANGED_FILES != ''
        id: ruff-lint
        run: |
          output=$(poetry run ruff check $CHANGED_FILES || true)
          echo "$output" | tee ruff_lint_output.txt
          echo "RUFF_LINT_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment on PR with Ruff results
        uses: actions/github-script@v6
        if: env.CHANGED_FILES != ''
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const formatOutput = process.env.RUFF_FORMAT_OUTPUT.trim();
            const lintOutput = process.env.RUFF_LINT_OUTPUT.trim();
            const pr_number = context.payload.pull_request.number;

            // Check if outputs have meaningful content (more than 1 line)
            const formatLines = formatOutput.split('\n').length;
            const lintLines = lintOutput.split('\n').length;
            const hasFormatIssues = formatLines > 1;
            const hasLintIssues = lintLines > 1;

            // Only comment if there are issues
            if (!hasFormatIssues && !hasLintIssues) {
              console.log("No linting or formatting issues detected. Skipping comment.");
              return;
            }

            let body = "### 🛠 Ruff Check & Format Results\n";

            if (hasFormatIssues) {
              body += "\n#### ⚠️ Format Issues Detected\n";
              body += "<details>\n<summary>Show details</summary>\n\n```\n" + formatOutput + "\n```\n</details>\n\n";
              body += "📌 Please run `poetry run ruff format .` locally to fix formatting issues.\n\n";
            }

            if (hasLintIssues) {
              body += "\n#### 🚨 Lint Issues Detected\n";
              body += "<details>\n<summary>Show details</summary>\n\n```\n" + lintOutput + "\n```\n</details>\n";
            }

            body += "\n🛠 Run `poetry install -E dev` to set up pre-commit hooks and apply fixes locally. (or run `poetry run pre-commit` before run git commit)";

            github.rest.issues.createComment({
              issue_number: pr_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if ruff format issues detected
        if: env.CHANGED_FILES != ''
        run: |
          line_count=$(wc -l < ruff_format_output.txt)
          if [ "$line_count" -gt 1 ]; then
            echo "Error: Ruff format detected formatting issues (output has $line_count lines)"
            exit 1
          fi

      - name: Fail if ruff lint issues detected
        if: env.CHANGED_FILES != ''
        run: |
          line_count=$(wc -l < ruff_lint_output.txt)
          if [ "$line_count" -gt 1 ]; then
            echo "Error: Ruff lint detected issues (output has $line_count lines)"
            exit 1
          fi
