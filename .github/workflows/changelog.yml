name: Changelog

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate changelog for (e.g. v0.3.0). Defaults to latest tag.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No tag found. Push a tag or provide one via workflow_dispatch."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Determine release branch for tag
        id: branch
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' -q
          BASE=$(git branch -r --contains "${{ steps.tag.outputs.tag }}" \
            | sed 's#^[* ]*origin/##' \
            | grep -E '^release/v[0-9]' | sort -V | tail -1)
          if [ -z "$BASE" ]; then
            BASE="main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Using base branch: $BASE"

      - name: Determine changelog range
        id: range
        run: |
          git fetch --tags -q
          CURRENT_TAG="${{ steps.tag.outputs.tag }}"
          CURRENT_EPOCH=$(git log -1 --format=%at "$CURRENT_TAG")

          # The most recent FINAL tag (excluding rc/nightly/dev) whose commit
          # predates CURRENT_TAG's commit, chosen by commit timestamp rather
          # than `sort -V` -- version-string sort doesn't understand semver
          # pre-release ordering (e.g. GNU sort -V places "v0.5.0" *before*
          # "v0.5.0-rc.2", the opposite of their real chronological order),
          # which would misidentify the candidate whenever an RC and its
          # eventual final tag coexist in the tag list. This covers patches
          # correctly too: v0.5.0 is v0.5.1's most recent preceding final tag
          # AND a real ancestor (same release branch), so v0.5.1's changelog
          # is scoped to v0.5.0..v0.5.1, not re-including everything since
          # v0.4.0.
          CANDIDATE=""
          CANDIDATE_EPOCH=0
          for t in $(git tag -l 'v[0-9]*' | grep -vE -- '-rc\.|-nightly\.|\.dev' | grep -v -x "$CURRENT_TAG"); do
            T_EPOCH=$(git log -1 --format=%at "$t" 2>/dev/null || echo 0)
            if [ "$T_EPOCH" -lt "$CURRENT_EPOCH" ] && [ "$T_EPOCH" -gt "$CANDIDATE_EPOCH" ]; then
              CANDIDATE="$t"
              CANDIDATE_EPOCH="$T_EPOCH"
            fi
          done

          if [ -n "$CANDIDATE" ] && git merge-base --is-ancestor "$CANDIDATE" "$CURRENT_TAG" 2>/dev/null; then
            echo "range=${CANDIDATE}..${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
            echo "Changelog range: ${CANDIDATE} (most recent preceding final tag) .. ${CURRENT_TAG}"
            exit 0
          fi

          # The most recent preceding tag exists but is NOT a real ancestor --
          # e.g. the previous cycle's merge-back PR (release/vX.Y -> main)
          # hadn't landed by the time this release branch was cut, so its tag
          # lives on a diverged line (confirmed via
          # `git merge-base --is-ancestor v0.4.0 v0.5.0` returning false on
          # this repo; see PR #1561 review). Do NOT keep searching further
          # back for any older ancestor tag -- that would silently re-include
          # an entire prior cycle's changes (e.g. landing on v0.3.1 and
          # re-listing all of v0.4.0's content in v0.5.0's notes). Fall back
          # instead to the fork point of the *previous release branch* off
          # main, which is always a real ancestor since main only grows
          # forward, and correctly scopes to "what's new since that branch
          # point" without re-including anything already released.
          CURRENT_BRANCH="${{ steps.branch.outputs.base }}"

          if [ "$CURRENT_BRANCH" = "main" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "Tag is on main, not a release branch, and the preceding tag isn't an ancestor; falling back to --latest"
            exit 0
          fi

          PREV_BRANCH=$(git branch -r --list 'origin/release/v*' \
            | sed 's#^[* ]*origin/##' \
            | sort -V \
            | grep -B1 -x "$CURRENT_BRANCH" | head -1)

          if [ -z "$PREV_BRANCH" ] || [ "$PREV_BRANCH" = "$CURRENT_BRANCH" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "No previous release branch found (first release); falling back to --latest"
            exit 0
          fi

          START=$(git merge-base origin/main "origin/$PREV_BRANCH")
          echo "range=${START}..${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Changelog range: ${START} (${PREV_BRANCH}'s fork point from main) .. ${CURRENT_TAG}"



      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff-latest
        with:
          config: cliff.toml
          args: ${{ steps.range.outputs.range && format('{0} --strip header', steps.range.outputs.range) || '--latest --strip header' }}
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        id: cliff-full
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        id: changelog-diff
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged, skipping PR"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR to update CHANGELOG.md
        if: steps.changelog-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.branch.outputs.base }}
          commit-message: "docs: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          title: "docs: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated by changelog.yml via git-cliff. Both `main` and release branches require PRs (org ruleset), so this can't be pushed directly."
          branch: "changelog/${{ steps.tag.outputs.tag }}"
          add-paths: CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md
          retention-days: 90
