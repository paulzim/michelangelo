name: Build kuberay images

# Builds and publishes kuberay-collector and kuberay-historyserver to GHCR.
# Patches the upstream Dockerfile (which hardcodes GOARCH=amd64) to honor
# TARGETARCH so we get true multi-arch images.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-kuberay-images.yaml
  pull_request:
    paths:
      - .github/workflows/build-kuberay-images.yaml
  workflow_dispatch:
    inputs:
      kuberay_ref:
        description: "Git ref of ray-project/kuberay to build from"
        required: false
        default: "v1.6.1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  # Pinned upstream kuberay ref. Keep in sync with
  # scripts/kuberay/build-kuberay-images.sh (KUBERAY_REF default).
  KUBERAY_REF_DEFAULT: v1.6.1

jobs:
  build-kuberay-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: kuberay-collector,     dockerfile: Dockerfile.collector }
          - { name: kuberay-historyserver, dockerfile: Dockerfile.historyserver }

    steps:
      - name: Check out kuberay (upstream)
        uses: actions/checkout@v4
        with:
          repository: ray-project/kuberay
          ref: ${{ github.event.inputs.kuberay_ref || env.KUBERAY_REF_DEFAULT }}
          path: kuberay

      - name: Patch Dockerfile to honor TARGETARCH
        # Produces true multi-arch binaries. The upstream Dockerfile hardcodes
        # GOARCH=amd64; TARGETARCH:- amd64 keeps amd64 as the default for
        # any non-buildx caller.
        working-directory: kuberay/historyserver
        run: |
          sed -i.bak \
            -e 's|^ARG ENABLE_RACE=false$|ARG ENABLE_RACE=false\nARG TARGETARCH|' \
            -e 's|GOARCH=amd64|GOARCH=${TARGETARCH:-amd64}|g' \
            Dockerfile.collector
          sed -i.bak \
            -e 's|^ARG GOPROXY=https://proxy.golang.org,direct$|ARG GOPROXY=https://proxy.golang.org,direct\nARG TARGETARCH|' \
            -e 's|GOARCH=amd64|GOARCH=${TARGETARCH:-amd64}|g' \
            Dockerfile.historyserver
          rm -f Dockerfile.*.bak

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.component.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: kuberay/historyserver
          file: kuberay/historyserver/${{ matrix.component.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}
