name: Integration tests

on:
  workflow_run:
    workflows: ["Build examples Docker image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: >
          GHCR examples image tag to use as the task image.
          Use your branch name or a sha- tag to test a branch build.
          Defaults to "latest" (built from main).
        required: false
        default: "latest"
  workflow_call:
    inputs:
      image_tag:
        description: "GHCR examples image tag"
        required: false
        type: string
        default: "latest"
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC every day

jobs:
  sandbox-e2e:
    # For workflow_run: only proceed if the triggering build succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux, gcp]
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # k3d, kubectl, helm, and AWS CLI v2 are pre-installed on the GCP self-hosted runner.
      # The examples task image is pre-loaded into k3s containerd on the runner VM.
      # Install Poetry + project dependencies using the system Python 3.11.
      - name: Install Poetry and dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          poetry env use python3
          poetry install --no-interaction -E dev -E example

      # Sync restarts only Michelangelo app services (apiserver, envoy, ui, worker,
      # controllermgr). Infrastructure (MySQL, Cadence, MinIO, Grafana, Prometheus)
      # is kept running between runs — no re-init overhead.
      - name: Sync sandbox
        run: |
          $HOME/.local/bin/poetry run ma sandbox sync --workflow cadence \
            --set apiserver.metadataStorage.enable=true \
            --set controllermgr.metadataStorage.enable=true \
            --set controllermgr.jobs.k8sengine.mapper.logPersistence.enabled=false \
            --set objectStorage.existingSecret=minio-credentials

      - name: Check out integration-test repo
        uses: actions/checkout@v4
        with:
          repository: michelangelo-ai/integration-test
          ref: main
          token: ${{ secrets.CR_PAT }}
          path: integration-test

      - name: Install integration test dependencies
        run: .venv/bin/pip install retrying pyyaml pymysql -q

      - name: Run API CRUD tests
        run: |
          $GITHUB_WORKSPACE/python/.venv/bin/pytest \
            functional/api/test_api_crud.py \
            -v -m "api and crud"
        working-directory: ${{ github.workspace }}/integration-test
        env:
          MA_API_SERVER: localhost:15566
          GIT_REF: main
          PYTHONPATH: ${{ github.workspace }}/integration-test

      - name: Run API MySQL backend tests
        run: |
          $GITHUB_WORKSPACE/python/.venv/bin/pytest \
            functional/api/test_api_mysql.py \
            -v -m "api and ci"
        working-directory: ${{ github.workspace }}/integration-test
        env:
          MA_API_SERVER: localhost:15566
          GIT_REF: main
          PYTHONPATH: ${{ github.workspace }}/integration-test

      - name: Wait for worker to connect to Cadence
        run: |
          echo "Waiting for worker to establish Cadence connection..."
          for i in $(seq 1 30); do
            if kubectl logs deployment/michelangelo-worker --since=120s 2>/dev/null \
                | grep -q "Started Activity Worker"; then
              echo "Worker connected to Cadence."
              exit 0
            fi
            echo "  attempt $i/30, retrying in 5s..."
            sleep 5
          done
          echo "WARNING: worker did not confirm Cadence connection after 150s, proceeding anyway"

      - name: Run CLI e2e tests
        run: |
          $GITHUB_WORKSPACE/python/.venv/bin/pytest \
            functional/cli/test_cli.py \
            -v -m "cli"
        working-directory: ${{ github.workspace }}/integration-test
        env:
          MA_API_SERVER: localhost:15566
          MA_NAMESPACE: ma-dev-test
          MICHELANGELO_PYTHON_DIR: ${{ github.workspace }}/python
          PYTHONPATH: ${{ github.workspace }}/integration-test

      # Infrastructure is intentionally kept running between CI runs.
